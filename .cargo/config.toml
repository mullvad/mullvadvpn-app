# Supply-chain hardening: refuse dependency versions published within the cooldown
# window set below, giving malicious releases time to be caught before we
# depend on them.
# This is a nightly-only feature for now. Stable cargo ignores these keys, so locally
# it only takes effect under `cargo +nightly update ...`. CI enforces the cooldown
# via ci/check-rust-min-publish-age.py, which reads global-min-publish-age from here
# as the single source of truth.
# Tracking issue: https://github.com/rust-lang/cargo/issues/17009
[unstable]
min-publish-age = true

[registry]
global-min-publish-age = "7 days"

# The /Brepro and /PDBALTPATH link args below make the linked PE files reproducible:
# /Brepro replaces the PE TimeDateStamp (normally the link time) with a hash of the
# inputs, and /PDBALTPATH:%_PDB% embeds only the PDB file name, not its absolute path,
# in the PE debug directory. Both are required for reproducible builds.
[target.x86_64-pc-windows-msvc]
rustflags = [
  "-Ctarget-feature=+crt-static",
  "-Clink-arg=/Brepro",
  "-Clink-arg=/PDBALTPATH:%_PDB%",
]

[target.i686-pc-windows-msvc]
rustflags = [
  "-Ctarget-feature=+crt-static",
  "-Clink-arg=/Brepro",
  "-Clink-arg=/PDBALTPATH:%_PDB%",
]

[target.aarch64-pc-windows-msvc]
rustflags = [
  "-Ctarget-feature=+crt-static",
  "-Clink-arg=/Brepro",
  "-Clink-arg=/PDBALTPATH:%_PDB%",
]

[target.x86_64-unknown-linux-gnu.mnl]
rustc-link-lib = ["mnl"]
rustc-link-search = ["native=dist-assets/binaries/x86_64-unknown-linux-gnu"]

[target.x86_64-unknown-linux-gnu.nftnl]
rustc-link-lib = ["nftnl", "mnl"]
rustc-link-search = ["native=dist-assets/binaries/x86_64-unknown-linux-gnu"]

[target.aarch64-unknown-linux-gnu.mnl]
rustc-link-lib = ["mnl"]
rustc-link-search = ["native=dist-assets/binaries/aarch64-unknown-linux-gnu"]

[target.aarch64-unknown-linux-gnu.nftnl]
rustc-link-lib = ["nftnl", "mnl"]
rustc-link-search = ["native=dist-assets/binaries/aarch64-unknown-linux-gnu"]

[target.riscv64gc-unknown-linux-gnu.mnl]
rustc-link-lib = ["mnl"]
rustc-link-search = ["native=dist-assets/binaries/riscv64gc-unknown-linux-gnu"]

[target.riscv64gc-unknown-linux-gnu.nftnl]
rustc-link-lib = ["nftnl", "mnl"]
rustc-link-search = ["native=dist-assets/binaries/riscv64gc-unknown-linux-gnu"]
