---
name: iOS Validate build schemas
on:
  pull_request:
    types:
      - closed
    branches:
      - main
    paths:
      - .github/workflows/ios.yml
      - .github/workflows/ios-validate-build-schemas.yml
      - ios/.swiftformat
      - ios/**/*.swift
      - ios/**/*.xctestplan
      - Cargo.toml
  workflow_dispatch:

permissions: {}

jobs:
  test:
    if: github.event.pull_request.merged == true
    name: Validate build schemas
    runs-on: macos-15-xlarge
    env:
      SOURCE_PACKAGES_PATH: .spm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup project
        uses: ./.github/actions/ios/setup-project-toolchain

      - name: Run build validation for Staging and MockRelease configurations as well as the MullvadVPNUITests target
        run: |
          # Try to find iPhone 16 first
          DEVICE_UDID=$(xcrun simctl list devices available | grep "^ *iPhone 16" | \
          grep -oE "[A-F0-9-]{36}" | head -1)

          # Fallback to first available simulator
          if [ -z "$DEVICE_UDID" ]; then
              echo "ℹ️ iPhone 16 not found, using first available simulator"
              DEVICE_UDID=$(xcrun simctl list devices available | grep -v "unavailable" | \
              grep -oE "[A-F0-9-]{36}" | head -1)
          fi

          if [ -z "$DEVICE_UDID" ]; then
              echo "⚠️ No simulator available"
              exit 1
          fi

          # Boot simulator
          echo "Booting simulator $DEVICE_UDID..."
          xcrun simctl boot "$DEVICE_UDID" || true
          xcrun simctl bootstatus "$DEVICE_UDID" -b

          # Set destination using UDID only
          DESTINATION="platform=iOS Simulator,id=$DEVICE_UDID"
          echo "✅ Using destination: $DESTINATION"

          set -o pipefail && env NSUnbufferedIO=YES xcodebuild \
          -project MullvadVPN.xcodeproj \
          -scheme MullvadVPN \
          -configuration MockRelease \
          -destination "platform=iOS Simulator,name=iPhone 16" \
          -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_PATH" \
          -disableAutomaticPackageResolution \
          build
          set -o pipefail && env NSUnbufferedIO=YES xcodebuild \
          -project MullvadVPN.xcodeproj \
          -scheme MullvadVPN \
          -configuration Staging \
          -destination "platform=iOS Simulator,name=iPhone 16" \
          -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_PATH" \
          -disableAutomaticPackageResolution \
          build
          set -o pipefail && env NSUnbufferedIO=YES xcodebuild \
          -project MullvadVPN.xcodeproj \
          -scheme MullvadVPNUITests \
          -configuration Debug \
          -destination "platform=iOS Simulator,name=iPhone 16" \
          -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_PATH" \
          -disableAutomaticPackageResolution \
          build
        working-directory: ios/
