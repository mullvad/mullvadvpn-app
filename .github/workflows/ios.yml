---
name: iOS app
on:
  pull_request:
    paths:
      - .github/workflows/ios.yml
      - ios/build-rust-library.sh
      - ios/.swift-format
      - ios/wireguard-apple
      - ios/**/*.swift
      - ios/**/*.xctestplan
      # Rust code is generally checked in the ios-rust-ffi.yml workflow,
      # But changing the Rust compiler can affect Swift->Rust linking not detected
      # by that workflow, so we trigger the full iOS build on it.
      - rust-toolchain.toml
      # Changes to the FFI can affect the linking but not be detected `ios-rust-ffi.yml`.
      - 'mullvad-ios/**'
  workflow_dispatch:

permissions: {}

jobs:
  swift-format:
    name: Run swift format lint
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run swift format lint
        run: ./format.sh lint -s
        working-directory: ios

  ui-test-build:
    name: Build for ui tests (staging)
    runs-on: macos-15
    env:
      SOURCE_PACKAGES_PATH: .spm
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup project
        uses: ./.github/actions/ios/setup-project-toolchain

      - name: Build for ui tests
        run: |
          set -o pipefail && env NSUnbufferedIO=YES xcodebuild \
          -project MullvadVPN.xcodeproj \
          -scheme MullvadVPNUITests \
          -testPlan MullvadVPNUITestsAll \
          -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_PATH" \
          -disableAutomaticPackageResolution \
          -allowProvisioningUpdates \
          -destination "platform=iOS Simulator,name=iPhone 16" \
          clean build-for-testing 2>&1 | tee xcodebuild-raw.log | xcbeautify
        working-directory: ios/

      # xcbeautify swallows the output of Run Script build phases (e.g. the
      # `Build MullvadRustRuntime` phase that runs build-rust-library.sh), so a
      # failing `cargo build` is invisible in the beautified log. Surface the raw
      # log so the underlying rust/cargo error is diagnosable.
      - name: Print raw build log on failure
        if: failure()
        run: |
          echo "::group::rust/cargo/linker lines from raw xcodebuild log"
          grep -inE 'cargo|rustc|rustup|error\[|error:|could not compile|libmullvad_ios|toolchain|target may not|not installed' xcodebuild-raw.log || true
          echo "::endgroup::"
        working-directory: ios/

      - name: Upload raw build log on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: xcodebuild-raw-log-ui-test-build
          path: ios/xcodebuild-raw.log

  test:
    name: Unit tests
    runs-on: macos-15-xlarge
    env:
      SOURCE_PACKAGES_PATH: .spm
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup project
        uses: ./.github/actions/ios/setup-project-toolchain

      - name: Run unit tests
        run: |
          set -o pipefail && env NSUnbufferedIO=YES xcodebuild \
            -project MullvadVPN.xcodeproj \
            -scheme MullvadVPN \
            -testPlan MullvadVPNCI \
            -destination "platform=iOS Simulator,name=iPhone 16" \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_PATH" \
            -disableAutomaticPackageResolution \
            -allowProvisioningUpdates \
            -resultBundlePath xcode-test-report \
            test 2>&1 | tee xcodebuild-raw.log | xcbeautify
        working-directory: ios/

      # xcbeautify swallows the output of Run Script build phases (e.g. the
      # `Build MullvadRustRuntime` phase that runs build-rust-library.sh), so a
      # failing `cargo build` is invisible in the beautified log. Surface the raw
      # log so the underlying rust/cargo error is diagnosable.
      - name: Print raw build log on failure
        if: failure()
        run: |
          echo "::group::rust/cargo/linker lines from raw xcodebuild log"
          grep -inE 'cargo|rustc|rustup|error\[|error:|could not compile|libmullvad_ios|toolchain|target may not|not installed' xcodebuild-raw.log || true
          echo "::endgroup::"
        working-directory: ios/

      - name: Upload raw build log on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: xcodebuild-raw-log-unit-tests
          path: ios/xcodebuild-raw.log

      - name: Archive test report
        if: always()
        run: zip -r test-report.zip ios/xcode-test-report.xcresult

      - name: Store test report artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: test-report
          path: test-report.zip
