---
name: iOS app
on:
  pull_request:
    paths:
      - .github/workflows/ios.yml
      - ios/build-rust-library.sh
      - ios/.swiftformat
      - ios/wireguard-apple
      - ios/**/*.swift
      - ios/**/*.xctestplan
  workflow_dispatch:

permissions: {}

jobs:
  check-formatting:
    name: Check formatting
    runs-on: macos-15
    steps:
      - name: Install SwiftFormat
        run: |
          brew update
          brew upgrade swiftformat

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check formatting
        run: |
          swiftformat --version
          swiftformat --lint .
        working-directory: ios

  swiftlint:
    name: Run swiftlint
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run swiftlint
        run: |
          brew install swiftlint
          swiftlint --version
          swiftlint --reporter github-actions-logging
        working-directory: ios

  ui-test-build:
    name: Build for ui tests (staging)
    runs-on: macos-15
    env:
      SOURCE_PACKAGES_PATH: .spm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup project
        uses: ./.github/actions/ios/setup-project-toolchain

      - name: Build for ui tests
        run: |
          # Pick iPhone 16 first
          DEVICE_INFO=$(xcrun simctl list devices available | grep "^ *iPhone 16" | head -1)

          # Fallback to first available simulator
          if [ -z "$DEVICE_INFO" ]; then
              DEVICE_INFO=$(xcrun simctl list devices available | grep -v "unavailable" | \
              grep -E "iPhone|iPad" | head -1)
          fi

          # Extract name
          DEVICE_NAME=$(echo "$DEVICE_INFO" | awk -F '(' '{print $1}' | xargs)

          # Extract UDID
          DEVICE_UDID=$(echo "$DEVICE_INFO" | awk -F '[()]' '{print $2}' | xargs)

          # Extract OS version correctly (the last parentheses field)
          OS_VERSION=$(echo "$DEVICE_INFO" | awk -F '[()]' '{print $NF}' | xargs)

          # Boot simulator
          xcrun simctl boot "$DEVICE_UDID" || true
          xcrun simctl bootstatus "$DEVICE_UDID" -b

          # Build destination string using **correct OS version**
          DESTINATION="platform=iOS Simulator,name=$DEVICE_NAME,OS=$OS_VERSION"
          echo "✅ Using destination: $DESTINATION"


          set -o pipefail && env NSUnbufferedIO=YES xcodebuild \
          -project MullvadVPN.xcodeproj \
          -scheme MullvadVPNUITests \
          -testPlan MullvadVPNUITestsAll \
          -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_PATH" \
          -disableAutomaticPackageResolution \
          -destination "$DESTINATION" \
          clean build-for-testing 2>&1 | xcbeautify
        working-directory: ios/

  test:
    name: Unit tests
    runs-on: macos-15-xlarge
    env:
      SOURCE_PACKAGES_PATH: .spm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup project
        uses: ./.github/actions/ios/setup-project-toolchain

      - name: Run unit tests
        run: |
          # Pick iPhone 16 first
          DEVICE_INFO=$(xcrun simctl list devices available | grep "^ *iPhone 16" | head -1)

          # Fallback to first available simulator
          if [ -z "$DEVICE_INFO" ]; then
            DEVICE_INFO=$(xcrun simctl list devices available | grep -v "unavailable" | \
            grep -E "iPhone|iPad" | head -1)
          fi

          # Extract name
          DEVICE_NAME=$(echo "$DEVICE_INFO" | awk -F '(' '{print $1}' | xargs)

          # Extract UDID
          DEVICE_UDID=$(echo "$DEVICE_INFO" | awk -F '[()]' '{print $2}' | xargs)

          # Extract OS version correctly (the last parentheses field)
          OS_VERSION=$(echo "$DEVICE_INFO" | awk -F '[()]' '{print $NF}' | xargs)

          # Boot simulator
          xcrun simctl boot "$DEVICE_UDID" || true
          xcrun simctl bootstatus "$DEVICE_UDID" -b

          # Build destination string using **correct OS version**
          DESTINATION="platform=iOS Simulator,name=$DEVICE_NAME,OS=$OS_VERSION"
          echo "✅ Using destination: $DESTINATION"

          set -o pipefail && env NSUnbufferedIO=YES xcodebuild \
          -project MullvadVPN.xcodeproj \
          -scheme MullvadVPN \
          -testPlan MullvadVPNCI \
          -destination "platform=iOS Simulator,name=iPhone 16" \
          -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_PATH" \
          -disableAutomaticPackageResolution \
          -resultBundlePath xcode-test-report \
          test 2>&1 | xcbeautify
        working-directory: ios/

      - name: Archive test report
        if: always()
        run: zip -r test-report.zip ios/xcode-test-report.xcresult

      - name: Store test report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test-report.zip
