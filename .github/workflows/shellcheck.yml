---
name: Shellcheck - Lint shell scripts
on:
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          ignore_paths: >-
            ./android/gradlew
        env:
          SHELLCHECK_OPTS: --external-sources
