---
name: Code Owner - no ownerless files
description: Ensure that pull requests don't add files without a code owner
on:
  pull_request:

permissions: {}

jobs:
  check-ownerless-files:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Fetch PR head
        run: git fetch origin ${{ github.event.pull_request.head.sha }}

      - name: Check for new ownerless files
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { execSync } = require('child_process');

            function gitCheckout(ref) {
              execSync(`git checkout --force ${ref}`, { stdio: 'pipe' });
            }

            // Compute the set of ownerless files for the currently checked out
            // commit. Starts with all tracked files and removes any file matched
            // by a team's patterns in code-owners.json.
            async function getOwnerlessFiles() {
              const codeOwnerships = JSON.parse(fs.readFileSync('code-owners.json', 'utf-8'));

              // Start with every tracked file, then remove owned ones
              const ownerless = new Set(
                execSync('git ls-files', { encoding: 'utf-8' })
                  .trim().split('\n').filter(Boolean)
              );

              for (const [team, patterns] of Object.entries(codeOwnerships)) {
                // @actions/glob handles negation patterns (! prefix) natively
                const globber = await glob.create(patterns.join('\n'));
                const matches = await globber.glob();

                for (const match of matches) {
                  // glob returns absolute paths, convert to relative
                  ownerless.delete(path.relative(process.env.GITHUB_WORKSPACE, match));
                }
              }

              return ownerless;
            }

            const baseSha = '${{ github.event.pull_request.base.sha }}';
            const headSha = '${{ github.event.pull_request.head.sha }}';

            // Compute ownerless files on both base and head, then find files
            // that are newly ownerless in the PR (not already ownerless in base).
            const baseOwnerless = await getOwnerlessFiles();
            gitCheckout(headSha);
            const headOwnerless = await getOwnerlessFiles();

            console.log(`[DEBUG] Ownerless files in base: ${baseOwnerless.size}`);
            console.log(`[DEBUG] Ownerless files in head: ${headOwnerless.size}`);
            console.log('[DEBUG] All ownerless files in head:');
            for (const file of [...headOwnerless].sort()) {
              console.log(`  ${file}`);
            }

            const newOwnerless = [...headOwnerless]
              .filter(f => !baseOwnerless.has(f))
              .sort();

            if (newOwnerless.length === 0) {
              console.log('✅ All new/changed files have a code owner.');
              return;
            }

            console.log(`❌ Found ${newOwnerless.length} new ownerless file(s):`);
            for (const file of newOwnerless) {
              console.log(`  ${file}`);
            }

            core.summary.addHeading('New ownerless files', 2);
            core.summary.addRaw(
              'The following files were added or lost their code owner in this PR. '
              + 'Add them to a team in <code>code-owners.json</code> to fix this.\n\n'
            );
            core.summary.addList(newOwnerless.map(f => `<code>${f}</code>`));
            await core.summary.write();

            core.setFailed(
              `${newOwnerless.length} new ownerless file(s). `
              + 'Assign an owner in code-owners.json.'
            );
