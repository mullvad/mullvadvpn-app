---
name: YAML linting
on:
  pull_request:
    paths:
      - .github/workflows/yamllint.yml
      - .yamllint
      - '**/**.yml'
      - '**/**.yaml'
  workflow_dispatch:

permissions: {}

jobs:
  check-formatting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - run: sudo apt-get install yamllint
      - run: yamllint --strict .
