---
name: Android - Check kotlin formatting
on:
  pull_request:
    paths:
      - .github/workflows/android-kotlin-format-check.yml
      - android/gradle/libs.versions.toml
      - android/**/*.kt
      - android/**/*.kts
  workflow_dispatch:
    inputs:
      override_container_image:
        description: Override container image
        type: string
        required: false

permissions: {}

jobs:
  prepare:
    name: Prepare
    runs-on: android-build
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Use custom container image if specified
        if: ${{ github.event.inputs.override_container_image != '' }}
        run: echo "inner_container_image=${{ github.event.inputs.override_container_image }}"
          >> $GITHUB_ENV

      - name: Use default container image and resolve digest
        if: ${{ github.event.inputs.override_container_image == '' }}
        run: echo "inner_container_image=$(cat ./building/android-container-image.txt)" >> $GITHUB_ENV

    outputs:
      container_image: ${{ env.inner_container_image }}

  check-formatting:
    needs: prepare
    runs-on: android-build
    env:
      KTFMT_VERSION: "0.62"
    container:
      image: ${{ needs.prepare.outputs.container_image }}
      volumes:
        # node is symlinked in, w/o mounting it, when using a image node won't be found for the
        # checkout action
        # https://github.com/NixOS/nixpkgs/issues/306373
        - /nix:/nix
        - gradle-cache:/root/.gradle
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Cache ktfmt jar
        id: cache-ktfmt
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ktfmt.jar
          key: ${{ runner.os }}-ktfmt-${{ env.KTFMT_VERSION }}

      - name: Download ktfmt
        if: steps.cache-ktfmt.outputs.cache-hit != 'true'
        run: |
          curl -sSL -o ktfmt.jar \
          "https://github.com/facebook/ktfmt/releases/download/v$KTFMT_VERSION/ktfmt-$KTFMT_VERSION-with-dependencies.jar"

      - name: Run ktfmt check
        run: |
          find . -type f \( -name "*.kt" -o -name "*.kts" \) \
            -not -path "*/build/*" \
            -not -path "*/.gradle/*" \
            | xargs -r java -jar ktfmt.jar --kotlinlang-style --quiet --dry-run --set-exit-if-changed
