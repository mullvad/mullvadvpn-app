# See repository root `osv-scanner.toml` for instructions and rules for this file.
#
# Keep this file in sync with test/deny.toml

# Logging user input may result in poisoning logs with ANSI escape sequences
[[IgnoredVulns]]
id = "RUSTSEC-2025-0055"  # CVE-2025-58160
ignoreUntil = 2026-12-08
reason = "test-rpc does not deal with random user input"

# rand is unsound with a custom logger using `rand::rng()`
# Note: Fixed in `rand >= 0.9.3` and `rand >= 0.10.1`.
[[IgnoredVulns]]
id = "RUSTSEC-2026-0097"
ignoreUntil = 2026-10-13
reason = """
The `log` feature of `rand` is not enabled.
tarpc transitively depends on unsound version of `rand`, and upgrade path for tarpc is not straight-forward.
"""
