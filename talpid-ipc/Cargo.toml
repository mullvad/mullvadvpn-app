[package]
name = "talpid-ipc"
version = "0.1.0"
authors = ["Mullvad VPN <admin@mullvad.net>", "Linus Färnstrand <linus@mullvad.net>", "Erik Larkö <erik@mullvad.net>", "Andrej Mihajlov <and@mullvad.net>"]
description = "IPC client and server for talpid"
license = "GPL-3.0"

[dependencies]
error-chain = "0.12"
serde = "1.0"
serde_json = "1.0"
log = "0.4"
jsonrpc-core = { git = "https://github.com/mullvad/jsonrpc", branch = "construct-ipc-server-from-endpoint" }
jsonrpc-pubsub = { git = "https://github.com/mullvad/jsonrpc", branch = "construct-ipc-server-from-endpoint" }
jsonrpc-ipc-server = { git = "https://github.com/mullvad/jsonrpc", branch = "construct-ipc-server-from-endpoint" }
jsonrpc-client-core = { git = "https://github.com/mullvad/jsonrpc-client-rs", branch = "master" }
jsonrpc-client-ipc = { git = "https://github.com/mullvad/jsonrpc-client-rs", branch = "master" }

[dev-dependencies]
assert_matches = "1.0"
env_logger = "0.5"
jsonrpc-macros = { git = "https://github.com/mullvad/jsonrpc", branch = "construct-ipc-server-from-endpoint" }
uuid = { version = "0.6", features = ["v4"] }
futures = "0.1.23"
tokio-core = "0.1"
