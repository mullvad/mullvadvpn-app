sudo: false
env:
  global:
    - MACOSX_DEPLOYMENT_TARGET="10.7"

git:
  submodules: false

before_install:
  - git submodule update --init

matrix:
  include:
    - language: node_js
      node_js: '8'
      cache: yarn

      install:
        - yarn install
        - yarn run flow-typed install
      before_script:
        - export DISPLAY=:99.0; sh -e /etc/init.d/xvfb start
      script:
        - yarn run lint
        - yarn run flow
        - yarn run check-format
        - yarn test


    # Daemon - macOS
    - language: rust
      rust: stable
      os: osx
      cache: cargo
      before_script: &rust_before_script
        - env
        - source env.sh
      script: &rust_script
        - cargo build --verbose
        - cargo test --verbose

    # Daemon - Linux
    - language: rust
      rust: nightly
      os: linux
      addons: &rust_linux_addons
        apt:
         sources:
          - sourceline: "ppa:jonathonf/gcc-7.3"
            key_url: "https://pgp.key-server.io/download/0xE03043828C3FF4BB"
         packages:
          - binutils
      cache: cargo
      before_script: *rust_before_script
      script:
        - echo "LD VERSION -> $(ld --version)"
        - cargo build --verbose
        - cargo test --verbose
        # Install and run rustfmt on nightly only until rustfmt.toml settings are stabilized.
        - rustup component add rustfmt-preview
        - rustfmt --version
        - cargo fmt -- --check --unstable-features

    - language: rust
      rust: beta
      os: linux
      cache: cargo
      addons: *rust_linux_addons
      before_script: *rust_before_script
      script: &rust_linux_script
        - cargo build --verbose
        - cargo test --verbose

    - language: rust
      rust: stable
      os: linux
      cache: cargo
      addons: *rust_linux_addons
      before_script: *rust_before_script
      script: *rust_linux_script


notifications:
  email:
    on_success: never
    on_failure: never
